# PostgreSQL Configuration for LifeHub
# Use this profile by setting: spring.profiles.active=postgresql

# Database Configuration - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/lifehub_db
spring.datasource.username=lifehub_user
spring.datasource.password=${DB_PASSWORD:lifehub}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration for PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Note: Hibernate automatically detects PostgreSQL dialect, so this property is optional
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# Server Configuration
server.port=8080
spring.application.name=lifehub-backend

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-to-a-very-long-random-string}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.com.lifehub=DEBUG
logging.level.org.springframework.security=DEBUG

