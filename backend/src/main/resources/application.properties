# Server Configuration
server.port=8080
spring.application.name=lifehub-backend

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/lifehub_db
spring.datasource.username=lifehub_user
spring.datasource.password=lifehub
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Note: Hibernate automatically detects PostgreSQL dialect, so this property is optional
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# Note: For HS512, secret should be at least 64 bytes (512 bits)
# This is a longer secret key for better security
jwt.secret=your-secret-key-change-this-in-production-to-a-very-long-random-string-that-is-at-least-64-characters-long-for-hmac-sha512-algorithm-security
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Redis Configuration
# If Redis is not running, the app will still work but caching will be disabled
# To disable Redis caching, comment out the spring.cache.type line
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.enabled=false
# Disable Redis repository scanning (we only use Redis for caching, not repositories)
spring.data.redis.repositories.enabled=false
# Comment out the next line to disable Redis caching (app will use NoOp cache)
spring.cache.type=redis
spring.cache.redis.time-to-live=1800000

# Jackson Configuration for Java 8 Time Types
# Spring Boot 3.x should auto-enable JavaTimeModule, but we configure it explicitly in JacksonConfig
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false
spring.jackson.serialization.write-durations-as-timestamps=false

# Logging
logging.level.com.lifehub=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.cache=DEBUG



